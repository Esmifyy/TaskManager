<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">

  <title>Task Manager</title>

</head>
<body>

<!-- mt-5 ist ein Spacing (m = margin, t = top, 5 = größe -->
<div class="container-fluid mt-5 px-4">
  <!-- mb-4 ist ein Spacing (m = margin, b = bottom, 4 = größe -->
  <h1 class="mb-4">Task Manager</h1>

  <div class="mb-3">
    <a th:href="@{/tasks/create}" class="btn btn-success">
      Neue Task
    </a>
  </div>

  <!-- Kanban Board mit 4 Spalten -->
  <div class="row g-3">

    <div class="col-md-3">
      <div class="kanban-column">
        <h5>Offen <span class="badge bg-secondary" th:text="${#lists.size(offenTasks)}"></span></h5>

        <div class="kanban-card card mb-2" th:each="task : ${offenTasks}">
          <div class="card-body">
            <h6 class="card-title" th:text="${task.name}"></h6>
            <p class="card-text small" th:text="${task.description}"></p>
            <span class="badge bg-light text-dark" th:if="${task.category}" th:text="${task.category.name}"></span>

            <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="mt-2 d-flex gap-2">
              <select name="status" class="form-select form-select-sm">
                <option value="OFFEN" selected>Offen</option>
                <option value="IN_BEARBEITUNG">In Bearbeitung</option>
                <option value="DEPLOYED">Deployed</option>
                <option value="FERTIG">Fertig</option>
              </select>
              <button type="submit" class="btn btn-sm btn-outline-primary">Verschieben</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="kanban-column">
        <h5>In Bearbeitung <span class="badge bg-primary" th:text="${#lists.size(inBearbeitungTasks)}"></span></h5>

        <div class="kanban-card card mb-2" th:each="task : ${inBearbeitungTasks}">
          <div class="card-body">
            <h6 class="card-title" th:text="${task.name}"></h6>
            <p class="card-text small" th:text="${task.description}"></p>
            <span class="badge bg-light text-dark" th:if="${task.category}" th:text="${task.category.name}"></span>

            <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="mt-2 d-flex gap-2">
              <select name="status" class="form-select form-select-sm">
                <option value="OFFEN">Offen</option>
                <option value="IN_BEARBEITUNG" selected>In Bearbeitung</option>
                <option value="DEPLOYED">Deployed</option>
                <option value="FERTIG">Fertig</option>
              </select>
              <button type="submit" class="btn btn-sm btn-outline-primary">Verschieben</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="kanban-column">
        <h5>Deployed <span class="badge bg-info" th:text="${#lists.size(deployedTasks)}"></span></h5>

        <div class="kanban-card card mb-2" th:each="task : ${deployedTasks}">
          <div class="card-body">
            <h6 class="card-title" th:text="${task.name}"></h6>
            <p class="card-text small" th:text="${task.description}"></p>
            <span class="badge bg-light text-dark" th:if="${task.category}" th:text="${task.category.name}"></span>

            <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="mt-2 d-flex gap-2">
              <select name="status" class="form-select form-select-sm">
                <option value="OFFEN">Offen</option>
                <option value="IN_BEARBEITUNG">In Bearbeitung</option>
                <option value="DEPLOYED" selected>Deployed</option>
                <option value="FERTIG">Fertig</option>
              </select>
              <button type="submit" class="btn btn-sm btn-outline-primary">Verschieben</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="kanban-column">
        <h5>Fertig <span class="badge bg-success" th:text="${#lists.size(fertigTasks)}"></span></h5>

        <div class="kanban-card card mb-2" th:each="task : ${fertigTasks}">
          <div class="card-body">
            <h6 class="card-title" th:text="${task.name}"></h6>
            <p class="card-text small" th:text="${task.description}"></p>
            <span class="badge bg-light text-dark" th:if="${task.category}" th:text="${task.category.name}"></span>

            <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="mt-2 d-flex gap-2">
              <select name="status" class="form-select form-select-sm">
                <option value="OFFEN">Offen</option>
                <option value="IN_BEARBEITUNG">In Bearbeitung</option>
                <option value="DEPLOYED">Deployed</option>
                <option value="FERTIG" selected>Fertig</option>
              </select>
              <button type="submit" class="btn btn-sm btn-outline-primary">Verschieben</button>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
