<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

  <title>Task Manager</title>

</head>
<body>

<!-- mt-5 ist ein Spacing (m = margin, t = top, 5 = größe -->
<div class="container mt-5">
  <!-- mb-4 ist ein Spacing (m = margin, b = bottom, 4 = größe -->
  <h1 class="mb-4">Task Manager</h1>

  <div class="mb-3">
    <a th:href="@{/tasks/create}" class="btn btn-success">
      Neue Task
    </a>
  </div>

  <table class="table table-striped table-hover">

    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Beschreibung</th>
      <th>Status</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="task : ${tasks}">
      <td th:text="${task.id}"></td>
      <td th:text="${task.name}"></td>
      <td th:text="${task.description}"></td>

      <td>

        <span th:if="${task.completed}" class="badge bg-success">Erledigt</span>

        <span th:unless="${task.completed}" class="badge bg-warning text-dark">Offen</span>

      </td>
    </tr>
    </tbody>

  </table>



</div>

</body>
</html>
