<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <title>Neue Task erstellen</title>
</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="mb-0">Neue Task erstellen</h1>

        <div class="mb-3">
            <a th:href="@{/tasks}" class="btn btn-success">
                Zurück
            </a>
        </div>

    </div>

    <form th:action="@{/tasks/create}" th:object="${newTask}" method="post">

        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Beschreibung</label>
            <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Kategorie</label>
            <select id="category" th:field="*{category}" class="form-select">
                <option value="">Keine</option>
                <option value="BUG">Bug</option>
                <option value="FRONTEND">Frontend</option>
                <option value="BACKEND">Backend</option>
                <option value="PLANUNG">Planung</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="status" class="form-label">Status</label>
            <select id="status" th:field="*{status}" class="form-select">
                <option value="OFFEN">Offen</option>
                <option value="IN_BEARBEITUNG">In Bearbeitung</option>
                <option value="DEPLOYED">Deployed</option>
                <option value="FERTIG">Fertig</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="priority" class="form-label">Priorität</label>
            <select id="priority" th:field="*{priority}" class="form-select">
                <option value="1">1 - Entspannt</option>
                <option value="2">2 - Normal</option>
                <option value="3">3 - Dringend</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Task erstellen</button>

    </form>

</div>

</body>
</html>
